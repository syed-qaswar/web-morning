<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btn{
            background-color: transparent;
            border: none;
            border: 2px solid rgb(72, 72, 233);
            padding: 5px 7px;
            border-radius: 4px;
            transition: color 2s 3s, border 3s;

        }
        .btn:hover{
            background-color: rgb(72, 72, 233);
            border: 2px solid rgb(13, 13, 13);
            color: white;
        
        }

        input {
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.5);
        }


        label{display: block;}
        .input-box{display: block;}

        /* pseudo classes: lvah */
        a:link{
            color: brown;
        }
        a:visited{
            color: chartreuse;
        }
        a:active{
            color: purple;
        }
    </style>
</head>
