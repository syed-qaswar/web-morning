<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btn{
            background-color: transparent;
            border: none;
            border: 2px solid rgb(72, 72, 233);
            padding: 5px 7px;
            border-radius: 4px;
            transition: color 2s 3s, border 3s;

        }
        .btn:hover{
            background-color: rgb(72, 72, 233);
            border: 2px solid rgb(13, 13, 13);
            color: white;
        
        }
    </style>
</head>
<body>
    <!-- HTML Entity Codes -->
    <!-- <button>Click here <span style="color: blue;">&#8594;</span></button> -->

    <!-- CSS Hover -->
    <button class="btn">Click here</button>
    
</body>
</html>
