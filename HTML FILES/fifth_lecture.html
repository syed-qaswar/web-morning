<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fifth Lecture</title>
    
    <!-- to link the stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Inline and Block elements, External CSS -->

    <p style="border: 2px solid red">Block level element</p>

    <a href="" style="border: 2px solid blue">Inline element</a>
    <!-- <p>Another block element</p> -->
    <a href="" style="border: 2px solid blue">Inline element</a>

    <!-- changing block element to inline -->
    <p style="display: inline;">Another block element</p>

    <!-- changing inline element to block -->
    <span style="display: block;">this is some text</span>
    <a href="">inline element</a>

    <!-- semantic tags for Webpage layout -->

    <!-- top most section of our webpage (title, logo, menus) -->
    <header></header>
    
    <!-- main content -->
    <section class="about"></section>
    <section class="services"></section>

    <!-- last section of our webpage: copyright, menus, contact information -->
    <footer></footer>
</body>
</html>
