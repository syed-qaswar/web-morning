<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <!-- <h1 id="text"></h1> -->
    <!-- <input type="text" id="color"> -->
    <!-- <button onclick="changeColor()">Change Color</button> -->
    <!-- <button id="btn">Change Color</button> -->

    <!-- Calcultor using html, tailwind and js -->
    <!-- container -->
    <div class="min-h-screen bg-sky-300 flex justify-center items-center">
        <!-- calculator card -->
        <div class="bg-amber-200 p-3 rounded-sm">
            <h1 class="text-2xl font-bold mb-2">Calculator</h1>

            <input type="number" id="num1" placeholder="Enter a number.." class="border-2 border-blue-600 p-1 rounded-md">

            <input type="number" id="num2" placeholder="Enter another number.." class="border-2 border-blue-600 p-1 rounded-md">

            <div class="grid grid-cols-4 gap-1 py-3">
                <!-- buttons for arithmetic operations -->
                <button class="bg-blue-600 text-white p-2 rounded-sm" onclick="calculator('+')">+</button>

                <button class="bg-blue-600 text-white p-2 rounded-sm" onclick="calculator('-')">-</button>

                <button class="bg-blue-600 text-white p-2 rounded-sm" onclick="calculator('x')">x</button>

                <button class="bg-blue-600 text-white p-2 rounded-sm" onclick="calculator('/')">/</button>

                <button class="bg-red-600 text-white p-2 rounded-sm col-span-4" onclick="clearValues()">Clear</button>
            </div>
            <p class="bg-sky-300 font-semibold p-2 my-1 rounded-sm">Result: <span id="result"></span></p>
            

        </div>
    </div>

    <script src="../script/index.js"></script>
</body>
</html>
