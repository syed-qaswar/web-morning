<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Second Class</title>
</head>
<body>
    <!-- Headings -->
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>

    <!-- paragraph -->
    <p>This is a paragraph</p>

    <!-- HTML Lists -->
    
    <!-- un-ordered list -->
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>Js</li>
    </ul>

    <!-- ordered list -->
    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>Tailwind</li>
    </ol>

    <!-- descriptive list -->
    <dl>
        <!-- descriptive terms -->
        <dt>HTML</dt>
        <!-- descriptive description -->
        <dd>HTML is a markup language</dd>

        <dt>CSS</dt>
        <dd>CSS is used for styling</dd>
    </dl>

    <ul>

                <li>Lahore</li>
